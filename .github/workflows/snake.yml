name: Generate Snake Animation

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: liturriago
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Apply blue theme
        run: |
          # LIGHT mode - blue snake, blue gradient squares
          sed -i \
            -e 's/--cs:[^;]*/--cs:#0052FF/g' \
            -e 's/--c1:[^;]*/--c1:#D6E4FF/g' \
            -e 's/--c2:[^;]*/--c2:#85ADFF/g' \
            -e 's/--c3:[^;]*/--c3:#3377FF/g' \
            -e 's/--c4:[^;]*/--c4:#0052FF/g' \
            dist/github-contribution-grid-snake.svg

          # DARK mode - adds dark background + visible squares + blue snake
          sed -i 's|<svg \([^>]*\)>|<svg \1><rect width="100%" height="100%" fill="#0B0B12"/>|g' \
            dist/github-contribution-grid-snake-dark.svg

          sed -i \
            -e 's/--cs:[^;]*/--cs:#0052FF/g' \
            -e 's/--ce:[^;]*/--ce:#161B22/g' \
            -e 's/--c0:[^;]*/--c0:#161B22/g' \
            -e 's/--c1:[^;]*/--c1:#002266/g' \
            -e 's/--c2:[^;]*/--c2:#003399/g' \
            -e 's/--c3:[^;]*/--c3:#0044CC/g' \
            -e 's/--c4:[^;]*/--c4:#0052FF/g' \
            dist/github-contribution-grid-snake-dark.svg

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}