name: Generate Snake Animation

on:
  schedule:
    - cron: "0 12 * * *" # Runs automatically every day at 12:00 PM UTC
  workflow_dispatch:     # Allows manual trigger via the GitHub Actions tab
  push:
    branches: [main]     # Runs on every push to the main branch

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Generates the snake game grid from the user's contributions
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: liturriago
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Custom Blue Theme Layer
      - name: Apply blue and cyan theme
        run: |
          # LIGHT MODE CUSTOMIZATION
          # --cs: Snake head | --c1 to --c4: Contribution intensity grids (Light Blue to Dark Blue)
          sed -i \
            -e 's/--cs:[^;]*/--cs:#00A3FF/g' \
            -e 's/--c1:[^;]*/--c1:#E0F0FF/g' \
            -e 's/--c2:[^;]*/--c2:#99C2FF/g' \
            -e 's/--c3:[^;]*/--c3:#00509E/g' \
            -e 's/--c4:[^;]*/--c4:#002A66/g' \
            dist/github-contribution-grid-snake.svg

          # DARK MODE CUSTOMIZATION
          # Injecting a deep dark blue canvas background (#050b14)
          sed -i 's|<svg \([^>]*\)>|<svg \1><rect width="100%" height="100%" fill="#050b14"/>|g' \
            dist/github-contribution-grid-snake-dark.svg

          # --cs: Neon Cyan Snake | --ce/--c0: Empty nodes | --c1 to --c4: Deep tech blue gradients
          sed -i \
            -e 's/--cs:[^;]*/--cs:#00A3FF/g' \
            -e 's/--ce:[^;]*/--ce:#0e192c/g' \
            -e 's/--c0:[^;]*/--c0:#0e192c/g' \
            -e 's/--c1:[^;]*/--c1:#002A66/g' \
            -e 's/--c2:[^;]*/--c2:#00509E/g' \
            -e 's/--c3:[^;]*/--c3:#0077E6/g' \
            -e 's/--c4:[^;]*/--c4:#00A3FF/g' \
            dist/github-contribution-grid-snake-dark.svg

      # Deploy the generated SVGs to an isolated 'output' branch
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}